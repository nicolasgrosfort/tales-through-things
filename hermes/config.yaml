model:
  default: gpt-5.5
  provider: openai-codex
  base_url: https://chatgpt.com/backend-api/codex
agent:
  max_turns: 150
  verify_on_stop: false
terminal:
  backend: local
  cwd: /workspace
web:
  backend: ddgs
  use_gateway: false
browser:
  cloud_provider: local
  use_gateway: false
display:
  tool_progress: all
_config_version: 33
plugins:
  enabled: []
platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - vision
    - web
known_plugin_toolsets:
  cli:
    - spotify
image_gen:
  provider: openai-codex
  use_gateway: false
  model: gpt-image-2-medium
session_reset:
  mode: none
